# Perfil default (local sin Docker)
spring.application.name=consolidado-backend
server.port=8080

# JWT (externalizado; el default local NO debe usarse en produccion)
jwt.secret=${JWT_SECRET:Consolidado2025SecretKeyQueDebeSerLargaParaHMACSHA256!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (origenes permitidos separados por coma)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Host/puerto/credenciales SQL Server (compartidos por las 3 BDs).
# Por defecto apunta a la instancia default local en TCP 1433. Para una instancia
# nombrada usa SQLSERVER_HOST=localhost\\NOMBRE  (o define el puerto correspondiente).
db.host=${SQLSERVER_HOST:localhost}
db.port=${SQLSERVER_PORT:1433}
db.username=${SQLSERVER_USERNAME:sa}
db.password=${SQLSERVER_PASSWORD:Castillon@2025}
db.extra=encrypt=false;trustServerCertificate=true

# SQL Server - BD_CONSOLIDADO (principal: consolidado + outbox + usuarios)
spring.datasource.consolidado.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=BD_CONSOLIDADO;${db.extra}
spring.datasource.consolidado.username=${db.username}
spring.datasource.consolidado.password=${db.password}
spring.datasource.consolidado.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# SQL Server - BD_CASTILLON_VETERINARIA (fuente veterinaria)
spring.datasource.veterinaria.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=BD_CASTILLON_VETERINARIA;${db.extra}
spring.datasource.veterinaria.username=${db.username}
spring.datasource.veterinaria.password=${db.password}
spring.datasource.veterinaria.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# SQL Server - CASTILLONV2 (fuente restaurante/comercial)
spring.datasource.castillonv2.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=CASTILLONV2;${db.extra}
spring.datasource.castillonv2.username=${db.username}
spring.datasource.castillonv2.password=${db.password}
spring.datasource.castillonv2.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# SQL Server - SamarImportadora (fuente OLTP importadora)
spring.datasource.samar.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=SamarImportadora;${db.extra}
spring.datasource.samar.username=${db.username}
spring.datasource.samar.password=${db.password}
spring.datasource.samar.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# SQL Server - DW_SamarImportadora (fuente Data Warehouse)
spring.datasource.dwsamar.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=DW_SamarImportadora;${db.extra}
spring.datasource.dwsamar.username=${db.username}
spring.datasource.dwsamar.password=${db.password}
spring.datasource.dwsamar.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Power BI: links de los 4 dashboards publicados en la nube (2 producto + 2 cliente).
# Se exponen via GET /api/consolidado/powerbi. Vacios por defecto (se llenan por entorno).
powerbi.producto-1=${POWERBI_PRODUCTO_1:}
powerbi.producto-2=${POWERBI_PRODUCTO_2:}
powerbi.cliente-1=${POWERBI_CLIENTE_1:}
powerbi.cliente-2=${POWERBI_CLIENTE_2:}
