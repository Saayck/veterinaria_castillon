# Perfil docker (SQL Server externo publicado en el host)
jwt.secret=${JWT_SECRET:Consolidado2025SecretKeyQueDebeSerLargaParaHMACSHA256!}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Por defecto asume SQL Server publicado por el host en el puerto SQLSERVER_PORT
db.host=${SQLSERVER_HOST:host.docker.internal}
db.port=${SQLSERVER_PORT:1433}
db.username=${SQLSERVER_USERNAME:sa}
db.password=${SQLSERVER_PASSWORD:Castillon@2025}
db.extra=encrypt=false;trustServerCertificate=true

spring.datasource.consolidado.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=BD_CONSOLIDADO;${db.extra}
spring.datasource.consolidado.username=${db.username}
spring.datasource.consolidado.password=${db.password}
spring.datasource.consolidado.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.veterinaria.jdbc-url=jdbc:sqlserver://${db.host}:${db.port};databaseName=BD_CASTILLON_VETERINARIA;${db.extra}
