services:

  # =====================================================
  # Backend Orquestador (Spring Boot - Consolidado)
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consolidado-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # SQL Server externo publicado por el host (las 5 BDs comparten instancia).
      # host.docker.internal:1433 alcanza la instancia default del host.
      SQLSERVER_HOST: ${SQLSERVER_HOST:-host.docker.internal}
      SQLSERVER_PORT: ${SQLSERVER_PORT:-1433}
      SQLSERVER_USERNAME: ${SQLSERVER_USERNAME:-sa}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD:?defina SQLSERVER_PASSWORD en el archivo .env}
      # Seguridad
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET en el archivo .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      # Links de Power BI (opcionales)
      POWERBI_PRODUCTO_1: ${POWERBI_PRODUCTO_1:-}
      POWERBI_PRODUCTO_2: ${POWERBI_PRODUCTO_2:-}
      POWERBI_CLIENTE_1: ${POWERBI_CLIENTE_1:-}
      POWERBI_CLIENTE_2: ${POWERBI_CLIENTE_2:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - consolidado-net

  # =====================================================
  # Frontend React (build de produccion servido por nginx)
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: consolidado-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - consolidado-net

networks:
  consolidado-net:
    driver: bridge
